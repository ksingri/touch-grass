<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>Touch Grass</h1>

    <div class="stat-card">
      <span class="stat-number" id="block-count">0</span>
      <span class="stat-label">blocks today</span>
    </div>

    <div class="section">
      <h2>Blocked Sites</h2>
      <ul class="site-list" id="site-list"></ul>
    </div>

    <div class="section" id="overrides-section" style="display: none;">
      <h2>Active Overrides</h2>
      <ul class="override-list" id="override-list"></ul>
      <button class="clear-btn" id="clear-overrides">Clear All Overrides</button>
    </div>

    <div class="footer">Go live your life</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
